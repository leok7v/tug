# Boat — universal SwiftUI app shell for tug (macOS + iPadOS + iOS).
# Generate/refresh the Xcode project with:   xcodegen   (or: make)
#
# One multiplatform target. No `#if os(...)` in the Swift: platform code lives in
# Platform-iOS.swift / Platform-macOS.swift, each compiled only for its SDK via
# EXCLUDED_SOURCE_FILE_NAMES (the file excluded from the *other* SDK).
name: boat
options:
  bundleIdPrefix: dev.leok7v
  createIntermediateGroups: true
  schemePathPrefix: "./"
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
schemes:
  Boat:
    build:
      targets: { Boat: all }
    run: { config: Debug }
    archive: { config: Release }
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Xcode's "recommended settings" (set explicitly so it stops nagging; these
    # are already the effective defaults). Team lives at the project level so the
    # target inherits it.
    DEVELOPMENT_TEAM: "692R843P25"
    ENABLE_HARDENED_RUNTIME: "YES"
    DEAD_CODE_STRIPPING: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"
targets:
  Boat:
    type: application
    supportedDestinations: [macOS, iOS]
    deploymentTarget:
      macOS: "14.0"
      iOS: "17.0"
    sources:
      - Boat.swift
      - Terminal.swift
      - App-macOS.swift
      - App-iOS.swift
      - Platform-iOS.swift
      - Platform-macOS.swift
      - ARM64Session-macOS.swift
      - Assets.xcassets
      # tug engine (embeddable library) + the TinyEMU core it drives. Same object
      # set the Makefile links for `tug`, minus temu.o (its own main) — Boat
      # provides main via SwiftUI. riscv_cpu.c is compiled at both XLENs through
      # the two wrappers (see src/riscv_cpu_xlen*.c). These live under vendors/
      # (gitignored) — run `make build embed` before generating/opening.
      - ../src/tug.c
      - ../src/riscv_cpu_xlen32.c
      - ../src/riscv_cpu_xlen64.c
      # Vendored TinyEMU/slirp: skip the clang static analyzer (Product>Analyze) on
      # third-party code we don't own — it only trips false positives there. No-op
      # for normal compiles; our own src/*.c above stay analyzed.
      - path: ../vendors/tinyemu/virtio.c
        compilerFlags: &noanalyze ["-Xclang", "-analyzer-disable-all-checks"]
      - path: ../vendors/tinyemu/pci.c
        compilerFlags: *noanalyze
      - path: ../vendors/tinyemu/fs.c
        compilerFlags: *noanalyze
      - path: ../vendors/tinyemu/cutils.c
        compilerFlags: *noanalyze
      - path: ../vendors/tinyemu/iomem.c
        compilerFlags: *noanalyze
      - path: ../vendors/tinyemu/simplefb.c
        compilerFlags: *noanalyze
      - path: ../vendors/tinyemu/json.c
        compilerFlags: *noanalyze
      - path: ../vendors/tinyemu/machine.c
        compilerFlags: *noanalyze
      - path: ../vendors/tinyemu/fs_disk.c
        compilerFlags: *noanalyze
      - path: ../vendors/tinyemu/riscv_machine.c
        compilerFlags: *noanalyze
      - path: ../vendors/tinyemu/softfp.c
        compilerFlags: *noanalyze
      - path: ../vendors/tinyemu/slirp
        includes: ["*.c"]
        compilerFlags: *noanalyze
      # guest payload baked in as app resources (staged by mac/stage-payload.sh):
      # bios/kernel/apk-initrd, plus the pre-seeded Alpine data disk packed as a
      # sparse manifest (expanded into Documents on first launch).
      - path: payload/bios.bin
        buildPhase: resources
      - path: payload/kernel.bin
        buildPhase: resources
      - path: payload/initrd.cgz
        buildPhase: resources
      - path: payload/data.sparse
        buildPhase: resources
      # ARM64 (macOS/VZ) payload — our own arm64 kernel + Alpine aarch64 initramfs.
      # (Bundled on all platforms for now; iOS doesn't use it — a per-SDK resource
      # split is a future size optimization.)
      - path: payload/kernel-arm64.bin
        buildPhase: resources
      - path: payload/initrd-arm64.cgz
        buildPhase: resources
      - path: payload/data-arm64.sparse
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Boat
        PRODUCT_BUNDLE_IDENTIFIER: dev.leok7v.boat
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # --- tug engine / TinyEMU C build ---
        # Optimize the C (emulator) even in Debug — the Boat target's only C is the
        # vendored TinyEMU core + tug.c, which we don't step through; at the Debug
        # default of -O0 the interpreter runs several times slower. Swift keeps its
        # per-config level (SWIFT_OPTIMIZATION_LEVEL: -Onone in Debug, still
        # debuggable). Release C is -O2 too (vs the -Os default), for speed.
        GCC_OPTIMIZATION_LEVEL: "2"
        SWIFT_OBJC_BRIDGING_HEADER: Boat-Bridging.h
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../vendors/tinyemu"
          - "$(SRCROOT)/../vendors/tinyemu/slirp"
          - "$(SRCROOT)/../src"
          - "$(SRCROOT)/../compat"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "CONFIG_SLIRP"
          - "CONFIG_RISCV_MAX_XLEN=64"
          - "_FILE_OFFSET_BITS=64"
          - "_LARGEFILE_SOURCE"
          - "_GNU_SOURCE"
        # forced-include the Darwin compat shim; -w silences the vendored core's
        # warnings (it builds clean under the Makefile's plain cc). -fno-modules:
        # the Makefile's plain-cc build has no clang modules, so slirp's local
        # struct sbuf/tcpcb/udphdr/ipovly never meet the system <netinet/*>
        # versions. Xcode enables modules by default, which auto-imports those
        # system headers and flags the redefinitions — turn modules off for the
        # C TUs only (Swift's own module handling is unaffected).
        OTHER_CFLAGS:
          - "-include"
          - "$(SRCROOT)/../compat/darwin_compat.h"
          - "-w"
          - "-fno-modules"
          # Xcode's Debug config defines DEBUG=1, which enables slirp's DPRINTF
          # debug code (latent type bug, never built under the Makefile's plain
          # cc). Undefine it for the C TUs; Swift keeps DEBUG for #if DEBUG.
          - "-UDEBUG"
        GCC_TREAT_WARNINGS_AS_ERRORS: "NO"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Boat
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        # iPad: run full-screen (no multitasking) so iPadOS stops requiring all
        # orientations — and the terminal gets the whole screen.
        INFOPLIST_KEY_UIRequiresFullScreen: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSHumanReadableCopyright: "tug — MIT"
        # compile each platform file only for its own SDK (no #if in the source)
        "EXCLUDED_SOURCE_FILE_NAMES[sdk=macosx*]": "Platform-iOS.swift App-iOS.swift"
        "EXCLUDED_SOURCE_FILE_NAMES[sdk=iphoneos*]": "Platform-macOS.swift App-macOS.swift ARM64Session-macOS.swift"
        "EXCLUDED_SOURCE_FILE_NAMES[sdk=iphonesimulator*]": "Platform-macOS.swift App-macOS.swift ARM64Session-macOS.swift"
        # Virtualization.framework entitlement (macOS only; auto-linked from the
        # `import Virtualization` in ARM64Session-macOS.swift).
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": "Boat-macOS.entitlements"
        # Automatic signing so the app installs on a real device. Headless
        # simulator/macOS verification (make mac / make ios) still passes
        # CODE_SIGNING_ALLOWED=NO on the xcodebuild command line to skip it.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        # DEVELOPMENT_TEAM is set at the project level (target inherits it)
